<div class="bg-c-bg-contrast flex flex-col h-dvh overflow-hidden">
  <div class="flex flex-row justify-between shrink-0">
    <div class="mb-20 ml-12">
      <p class="text-3xl text-white pt-4">Commit</p>
    </div>
    <div
      class="mt-2 flex flex-row justify-evenly gap-2 place-items-end mb-3 mr-3"
    >
      <trh-button
        [value]="'Save'"
        [disabled]="!isSaveAllowed"
        (pressed)="onAddClick($event)"
      />
    </div>
  </div>
  <div class="flex-1 min-h-0 overflow-hidden">
    <trh-commit-container
      (applyTemplate)="onTemplateApplied($event)"
      (applyRecord)="onRecordApplied($event)"
    >
      <div class="h-full min-h-0 border-t border-solid border-c-border">
        <div class="flex flex-col mx-10 mt-4 gap-6">
          <div>
            <p class="text-slate-200 mb-1 pl-2">Text template:</p>
            <textarea
              [value]="text"
              (input)="onInput($event)"
              class="bg-zinc-900 border border-gray-600 rounded-md p-2.5 text-gray-200"
              rows="24"
              cols="125"
              placeholder="Type your message here..."
            ></textarea>
          </div>
          <div class="m-2 w-fit">
            <p class="text-slate-200 mb-1">Preview:</p>
            @if (!playDate) {
            <trh-preview-validation [issue]="'Play date is required'">
            </trh-preview-validation>
            } @if (!previewRecords || previewRecords.length < 1) {
            <trh-preview-validation [issue]="'No exercise records detected'">
            </trh-preview-validation>
            } @for (item of validationIssues(); track $index) {
            <trh-preview-validation
              [issue]="item.errorReason!"
              [lineNumber]="item.lineNumber"
            >
            </trh-preview-validation>
            } @if (isSaveAllowed) {
            <p
              class="pl-4 p-2 text-lime-500 rounded-l-lg border-l border-b border-solid border-zinc-600"
            >
              No issues were found
            </p>
            }
          </div>
        </div>
      </div>
    </trh-commit-container>
  </div>
</div>
