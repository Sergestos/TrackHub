@if (alert()) {
<div
  class="fixed top-5 right-3 min-w-72 bg-neutral-900 border-2 border-solid rounded-md shadow-lg text-sm transition-all"
  [ngClass]="css()"
  (click)="close()"
>
  <div class="flex flex-row gap-2">
    <div class="flex flex-row justify-between w-full">
      <p class="p-2">
        {{ alert()!.text }}
      </p>
      <p class="pr-3 pt-[3px] text-lg cursor-pointer">x</p>
    </div>
  </div>
</div>
}
